<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"="width=device-width, initial-scale=1.0">
    <title>Bio Profile Editor - Wave</title>
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .editor-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        .editor-panel {
            background: rgba(20, 20, 30, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
        }

        .preview-panel {
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #3b82f6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #a1a1aa;
        }

        input[type="text"],
        input[type="url"],
        textarea {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input[type="file"] {
            display: none;
        }

        .upload-btn {
            width: 100%;
            padding: 10px;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid #3b82f6;
            border-radius: 8px;
            color: #3b82f6;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .upload-btn:hover {
            background: rgba(59, 130, 246, 0.3);
        }

        .save-btn {
            width: 100%;
            padding: 15px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .save-btn:hover {
            background: #2563eb;
        }

        .preview-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .preview-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .preview-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #3b82f6;
            object-fit: cover;
            background: #1a1a2e;
        }

        .preview-info h3 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .preview-bio {
            color: #a1a1aa;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .preview-social {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .social-link {
            width: 40px;
            height: 40px;
            background: rgba(59, 130, 246, 0.2);
            border: 2px solid #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3b82f6;
            text-decoration: none;
            transition: all 0.3s;
        }

        .social-link:hover {
            background: rgba(59, 130, 246, 0.4);
            transform: scale(1.1);
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            background: #22c55e;
            color: #fff;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.error {
            background: #ef4444;
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <!-- Editor Panel -->
        <div class="editor-panel">
            <h2>✨ Bio Profile Editor</h2>
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="your_username" readonly>
            </div>

            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="displayName" placeholder="Your Display Name">
            </div>

            <div class="form-group">
                <label>Bio</label>
                <textarea id="bio" placeholder="Tell us about yourself..."></textarea>
            </div>

            <div class="form-group">
                <label>Avatar Image</label>
                <input type="file" id="avatar-input" accept="image/*">
                <button class="upload-btn" onclick="document.getElementById('avatar-input').click()">
                    📷 Upload Avatar
                </button>
            </div>

            <div class="form-group">
                <label>GitHub URL</label>
                <input type="url" id="github" placeholder="https://github.com/username">
            </div>

            <div class="form-group">
                <label>Discord</label>
                <input type="text" id="discord" placeholder="username#1234">
            </div>

            <div class="form-group">
                <label>Twitter URL</label>
                <input type="url" id="twitter" placeholder="https://twitter.com/username">
            </div>

            <div class="form-group">
                <label>YouTube URL</label>
                <input type="url" id="youtube" placeholder="https://youtube.com/@username">
            </div>

            <button class="save-btn" onclick="saveProfile()">💾 Save Profile</button>
        </div>

        <!-- Preview Panel -->
        <div class="preview-panel">
            <div class="preview-content">
                <div class="preview-header">
                    <img id="preview-avatar" class="preview-avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%231a1a2e' width='100' height='100'/%3E%3Ctext x='50' y='60' text-anchor='middle' fill='%233b82f6' font-size='40'%3E👤%3C/text%3E%3C/svg%3E" alt="Avatar">
                    <div class="preview-info">
                        <h3 id="preview-name">Username</h3>
                        <p id="preview-display">Display Name</p>
                    </div>
                </div>
                
                <div class="preview-bio" id="preview-bio-text">
                    Your bio will appear here...
                </div>

                <div class="preview-social" id="preview-social">
                    <!-- Social links will be added here -->
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        let avatarUrl = null;

        // Load user data
        document.addEventListener('DOMContentLoaded', () => {
            const username = localStorage.getItem('username');
            if (username) {
                document.getElementById('username').value = username;
                document.getElementById('preview-name').textContent = username;
            }

            // Load existing profile
            loadProfile();

            // Add input listeners for live preview
            document.getElementById('displayName').addEventListener('input', updatePreview);
            document.getElementById('bio').addEventListener('input', updatePreview);
            document.getElementById('github').addEventListener('input', updatePreview);
            document.getElementById('discord').addEventListener('input', updatePreview);
            document.getElementById('twitter').addEventListener('input', updatePreview);
            document.getElementById('youtube').addEventListener('input', updatePreview);

            // Avatar upload
            document.getElementById('avatar-input').addEventListener('change', handleAvatarUpload);
        });

        async function loadProfile() {
            // For now, just load from localStorage
            const saved = localStorage.getItem('bioProfile');
            if (saved) {
                const profile = JSON.parse(saved);
                document.getElementById('displayName').value = profile.displayName || '';
                document.getElementById('bio').value = profile.bio || '';
                document.getElementById('github').value = profile.github || '';
                document.getElementById('discord').value = profile.discord || '';
                document.getElementById('twitter').value = profile.twitter || '';
                document.getElementById('youtube').value = profile.youtube || '';
                if (profile.avatarUrl) {
                    avatarUrl = profile.avatarUrl;
                    document.getElementById('preview-avatar').src = avatarUrl;
                }
                updatePreview();
            }
        }

        async function handleAvatarUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                showToast('Image must be less than 5MB', 'error');
                return;
            }

            // Upload to ImgBB
            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('https://api.imgbb.com/1/upload?key=1606b78ff8eef2cbbbb20bba455dfdeb', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (data.success) {
                    avatarUrl = data.data.url;
                    document.getElementById('preview-avatar').src = avatarUrl;
                    showToast('Avatar uploaded!', 'success');
                } else {
                    showToast('Upload failed', 'error');
                }
            } catch (error) {
                console.error('Upload error:', error);
                showToast('Upload failed', 'error');
            }
        }

        function updatePreview() {
            const displayName = document.getElementById('displayName').value || 'Display Name';
            const bio = document.getElementById('bio').value || 'Your bio will appear here...';
            const github = document.getElementById('github').value;
            const discord = document.getElementById('discord').value;
            const twitter = document.getElementById('twitter').value;
            const youtube = document.getElementById('youtube').value;

            document.getElementById('preview-display').textContent = displayName;
            document.getElementById('preview-bio-text').textContent = bio;

            // Update social links
            const socialContainer = document.getElementById('preview-social');
            socialContainer.innerHTML = '';

            if (github) {
                socialContainer.innerHTML += `<a href="${github}" target="_blank" class="social-link">🐙</a>`;
            }
            if (discord) {
                socialContainer.innerHTML += `<a href="#" class="social-link">💬</a>`;
            }
            if (twitter) {
                socialContainer.innerHTML += `<a href="${twitter}" target="_blank" class="social-link">🐦</a>`;
            }
            if (youtube) {
                socialContainer.innerHTML += `<a href="${youtube}" target="_blank" class="social-link">📺</a>`;
            }
        }

        function saveProfile() {
            const profile = {
                username: document.getElementById('username').value,
                displayName: document.getElementById('displayName').value,
                bio: document.getElementById('bio').value,
                avatarUrl: avatarUrl,
                github: document.getElementById('github').value,
                discord: document.getElementById('discord').value,
                twitter: document.getElementById('twitter').value,
                youtube: document.getElementById('youtube').value
            };

            // Save to localStorage
            localStorage.setItem('bioProfile', JSON.stringify(profile));
            
            showToast('Profile saved!', 'success');

            // Animate save
            gsap.fromTo('.preview-content', 
                { scale: 1 }, 
                { scale: 1.05, duration: 0.2, yoyo: true, repeat: 1 }
            );
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
